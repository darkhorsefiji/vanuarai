<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380">
  <!-- Abstract Fiji landscape line-motif: mountains -> leaf -> river -> sea -> farms,
       each on a vertical fade so the elements gently dissolve into one another. -->
  <defs>
    <linearGradient id="fTop" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="380">
      <stop offset="0" stop-color="#fff" stop-opacity="1"/>
      <stop offset="0.5" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fMid" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="380">
      <stop offset="0.12" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fff" stop-opacity="1"/>
      <stop offset="0.88" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fBot" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="380">
      <stop offset="0.5" stop-color="#fff" stop-opacity="0"/>
      <stop offset="1" stop-color="#fff" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- mountains -->
    <path d="M-20 175 L60 95 L120 150 L200 70 L290 160 L370 85 L460 160 L545 95 L640 165" stroke="url(#fTop)"/>
    <path d="M-20 205 L80 140 L165 190 L255 120 L355 195 L450 135 L540 190 L640 150" stroke="url(#fTop)" stroke-width="1.3" opacity="0.6"/>
    <!-- leaf -->
    <path d="M165 270 C190 215 255 188 300 180 C262 226 214 256 165 270 Z" stroke="url(#fMid)"/>
    <path d="M165 270 L300 180" stroke="url(#fMid)" stroke-width="1.2"/>
    <path d="M205 246 L230 222" stroke="url(#fMid)" stroke-width="1"/>
    <path d="M238 228 L262 206" stroke="url(#fMid)" stroke-width="1"/>
    <path d="M262 212 L282 194" stroke="url(#fMid)" stroke-width="1"/>
    <!-- river -->
    <path d="M-20 300 C120 278 175 330 320 305 C470 280 545 322 660 300" stroke="url(#fMid)" stroke-width="2.4"/>
    <path d="M-20 312 C120 290 175 342 320 317 C470 292 545 334 660 312" stroke="url(#fMid)" stroke-width="1.1" opacity="0.55"/>
    <!-- sea -->
    <path d="M-20 350 q40 -11 80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0" stroke="url(#fBot)"/>
    <path d="M-20 365 q40 -11 80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0" stroke="url(#fBot)" stroke-width="1.3" opacity="0.7"/>
    <!-- farms (contoured fields) -->
    <path d="M380 330 C460 320 530 326 660 316" stroke="url(#fBot)" stroke-width="1.3"/>
    <path d="M395 344 C470 334 540 340 660 330" stroke="url(#fBot)" stroke-width="1.2"/>
    <path d="M410 358 C485 350 555 356 660 346" stroke="url(#fBot)" stroke-width="1.1" opacity="0.7"/>
  </g>
</svg>
