    <path d="M50 88 L56 80 L44 80 Z"/>
    <path d="M12 50 L20 56 L20 44 Z"/>
    <path d="M88 50 L80 56 L80 44 Z"/>
    <circle cx="50" cy="50" r="2.6"/>
    <circle cx="14" cy="14" r="1.8"/>
    <circle cx="86" cy="14" r="1.8"/>
    <circle cx="14" cy="86" r="1.8"/>
    <circle cx="86" cy="86" r="1.8"/>
  </g>
