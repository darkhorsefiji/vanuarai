name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps
        run: npm ci

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: Prettier check
        run: npx prettier --check .

      - name: ESLint (web)
        working-directory: web
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: |
          if grep -q '"test"' package.json; then npm test; else echo "no test script — skipping"; fi

  deploy:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy to VPS
        run: |
          set -e
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "bash -s" <<'EOF'
          set -e
          cd /var/www/vanuarai
          git pull origin main
          npm ci
          npm ci --prefix web
          npm run build
          pm2 start ecosystem.config.js
          pm2 save
          EOF
