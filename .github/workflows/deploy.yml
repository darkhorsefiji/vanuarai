name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps
        run: npm ci

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: Prettier check
        run: npx prettier --check .

      - name: ESLint (web)
        working-directory: web
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: |
          if grep -q '"test"' package.json; then npm test; else echo "no test script — skipping"; fi

  deploy:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes -i ~/.ssh/deploy_key \
            $VPS_USER@$VPS_HOST "bash -s" <<'REMOTE'
           set -e
           if [ ! -d /var/www/vanuarai ]; then
             mkdir -p /var/www/vanuarai
             git clone https://github.com/darkhorsefiji/vanuarai.git /var/www/vanuarai
           fi
           cd /var/www/vanuarai
           git pull origin main
           npm ci
           npm ci --prefix web
           npm run build
           pm2 start ecosystem.config.js
           pm2 save
           REMOTE
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
