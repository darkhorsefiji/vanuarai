name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps
        run: npm ci

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: Prettier check
        run: npx prettier --check .

      - name: ESLint (web)
        working-directory: web
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: |
          if grep -q '"test"' package.json; then npm test; else echo "no test script — skipping"; fi

  deploy:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/vanuarai
            git pull origin main
            npm ci
            npm ci --prefix web
            npm run build
            pm2 start ecosystem.config.js
            pm2 save
